services:
  - type: web
    name: elo-code-arena
    runtime: node
    plan: free
    rootDir: .
    buildCommand: cd backend && npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: COOKIE_SECURE
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: elo-code-arena-db
          property: connectionString

databases:
  - name: elo-code-arena-db
    plan: free
    region: frankfurt
    postgresMajorVersion: "18"
